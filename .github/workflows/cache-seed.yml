name: Cache Seed

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  seed-rust-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/savecloud-desktop/src-tauri"

      - name: Fetch dependencies

        run: cargo check
        working-directory: apps/savecloud-desktop/src-tauri
