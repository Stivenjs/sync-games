name: Cache Seed

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  seed-rust-cache:
    name: Seed (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
          - platform: macos-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev build-essential curl wget file libxdo-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/savecloud-desktop/src-tauri"
          add-job-id-key: false
      - name: Seed Cache
        run: cargo check --release
        working-directory: apps/savecloud-desktop/src-tauri
