name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-cli-windows:
    runs-on: windows-latest
    env:
      DEFINE_API_URL: "process.env.SYNC_GAMES_API_URL='${{ secrets.SYNC_GAMES_API_URL }}'"
      DEFINE_API_KEY: "process.env.SYNC_GAMES_API_KEY='${{ secrets.SYNC_GAMES_API_KEY }}'"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sync version from tag
        run: bun run scripts/sync-version.ts
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI (Windows x64)
        run: |
          New-Item -ItemType Directory -Force -Path dist
          bun build src/cli/index.ts --compile --outfile dist/savecloud-windows-x64.exe --define $env:DEFINE_API_URL --define $env:DEFINE_API_KEY --minify --windows-icon assets/icon.ico

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows
          path: dist/savecloud-windows-x64.exe

  build-desktop:
    runs-on: windows-latest
    env:
      SYNC_GAMES_API_URL: ${{ secrets.SYNC_GAMES_API_URL }}
      SYNC_GAMES_API_KEY: ${{ secrets.SYNC_GAMES_API_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Sync version from tag
        run: bun run scripts/sync-version.ts
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/sync-games-desktop

      - name: Build Tauri
        run: bun run tauri build
        working-directory: apps/sync-games-desktop

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: apps/sync-games-desktop/src-tauri/target/release/bundle/

  release:
    needs: [build-cli-windows, build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Consolidate release files
        run: |
          mkdir -p release
          find cli-windows -type f -exec cp {} release/ \;
          for dir in desktop-*; do
            [ -d "$dir" ] && find "$dir" -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.sig" \) -exec cp {} release/ \;
          done

      - name: Generate updater latest.json
        run: bun run scripts/generate-updater-json.ts
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
