name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cli-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
      - name: Sync version
        run: bun run scripts/sync-version.ts
        env:
          GITHUB_REF: ${{ github.ref }}
      - run: bun install --frozen-lockfile
      - name: Build CLI
        run: |
          New-Item -ItemType Directory -Force -Path dist
          bun build src/cli/index.ts --compile --outfile dist/savecloud-windows-x64.exe --define "process.env.SYNC_GAMES_API_URL='${{ secrets.SYNC_GAMES_API_URL }}'" --define "process.env.SYNC_GAMES_API_KEY='${{ secrets.SYNC_GAMES_API_KEY }}'" --minify --windows-icon assets/icon.ico
      - uses: actions/upload-artifact@v4
        with:
          name: cli-windows
          path: dist/savecloud-windows-x64.exe

  build-cli-unix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
      - name: Sync version
        run: bun run scripts/sync-version.ts
        env:
          GITHUB_REF: ${{ github.ref }}
      - run: bun install --frozen-lockfile
      - name: Build CLI Multi-platform
        run: |
          mkdir -p dist
          bun build src/cli/index.ts --compile --target=bun-linux-x64 --outfile dist/savecloud-linux-x64 --define "process.env.SYNC_GAMES_API_URL='${{ secrets.SYNC_GAMES_API_URL }}'" --define "process.env.SYNC_GAMES_API_KEY='${{ secrets.SYNC_GAMES_API_KEY }}'" --minify
          bun build src/cli/index.ts --compile --target=bun-darwin-arm64 --outfile dist/savecloud-darwin-arm64 --define "process.env.SYNC_GAMES_API_URL='${{ secrets.SYNC_GAMES_API_URL }}'" --define "process.env.SYNC_GAMES_API_KEY='${{ secrets.SYNC_GAMES_API_KEY }}'" --minify
          bun build src/cli/index.ts --compile --target=bun-darwin-x64 --outfile dist/savecloud-darwin-x64 --define "process.env.SYNC_GAMES_API_URL='${{ secrets.SYNC_GAMES_API_URL }}'" --define "process.env.SYNC_GAMES_API_KEY='${{ secrets.SYNC_GAMES_API_KEY }}'" --minify
      - uses: actions/upload-artifact@v4
        with:
          name: cli-unix
          path: dist/savecloud-*

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifactName: desktop-windows
            args: ""
          - platform: ubuntu-22.04
            artifactName: desktop-linux
            args: ""
          - platform: macos-latest
            artifactName: desktop-macos-universal
            args: "--target universal-apple-darwin"
            rustTargets: "aarch64-apple-darwin x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    env:
      SYNC_GAMES_API_URL: ${{ secrets.SYNC_GAMES_API_URL }}
      SYNC_GAMES_API_KEY: ${{ secrets.SYNC_GAMES_API_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev build-essential curl wget file libxdo-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/savecloud-desktop/src-tauri"
          add-job-id-key: false
          save-if: false

      - name: Sync version
        run: bun run scripts/sync-version.ts
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/savecloud-desktop

      - name: Build Tauri
        run: bun run tauri build ${{ matrix.args }}
        working-directory: apps/savecloud-desktop

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: apps/savecloud-desktop/src-tauri/target/**/release/bundle/

  release:
    needs: [build-cli-windows, build-cli-unix, build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Consolidate release files
        run: |
          mkdir -p release
          find . -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.sig" -o -name "*.app.tar.gz" -o -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -R release/

      - name: Generate updater latest.json
        run: bun run scripts/generate-updater-json.ts
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
