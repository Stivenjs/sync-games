service: sync-games

frameworkVersion: "4"

# Stage = entorno separado: cada uno tiene su propio stack (API Gateway, Lambda, S3 bucket).
# deploy --stage dev  → stack sync-games-dev, bucket y API de desarrollo.
# deploy --stage live → stack sync-games-live, bucket y API de producción.

provider:
  name: aws
  runtime: nodejs22.x
  region: us-east-2
  stage: ${opt:stage, 'dev'}
  environment:
    BUCKET_NAME: { Ref: SavesBucket }
    API_KEY: ${env:SYNC_GAMES_API_KEY, ''}
  httpApi:
    authorizers:
      apiKeyAuthorizer:
        type: request
        functionName: apiAuthorizer
        enableSimpleResponses: true
        resultTtlInSeconds: 0
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - Fn::Sub: "arn:aws:s3:::${SavesBucket}"
            - Fn::Sub: "arn:aws:s3:::${SavesBucket}/*"

build:
  esbuild:
    bundle: true
    sourcemap: true
    target: node22

functions:
  apiAuthorizer:
    handler: src/interfaces/lambda/authorizer.handler
    environment:
      API_KEY: ${env:SYNC_GAMES_API_KEY, ''}
  api:
    handler: src/interfaces/lambda/handler.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
          authorizer:
            name: apiKeyAuthorizer
      - httpApi:
          path: /
          method: ANY
          authorizer:
            name: apiKeyAuthorizer

resources:
  Resources:
    SavesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ["Content-Type", "x-user-id", "x-api-key"]
              AllowedMethods: [GET, PUT, HEAD]
              AllowedOrigins: ["*"]
